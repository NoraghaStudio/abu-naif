<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <!-- No redirect for abu-naif -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة أبو نايف لتقارير المركبات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f8fafc;
            --bg-surface: #ffffff;
            --bg-hover: #f1f5f9;
            --gold: #4d7d53;
            --gold-hover: #27564c;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(77, 125, 83, 0.2);
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 3rem;
            text-align: center;
        }

        .nav-item {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(30, 58, 138, 0.1);
            color: var(--gold);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 3rem 4rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .btn {
            background: var(--gold);
            color: var(--bg-dark);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: var(--gold-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #e60000;
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .delete-overlay {
            opacity: 1;
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s ease;
            margin-bottom: 2rem;
            width: 100%;
        }

        .upload-area:hover {
            border-color: var(--gold);
        }

        /* Reviews List */
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .review-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .review-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--gold);
        }

        .review-actions {
            display: flex;
            gap: 0.5rem;
        }

        .view-site-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            border: 1px solid var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .view-site-link:hover {
            background: var(--gold);
            color: var(--bg-dark);
        }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .login-box {
            background: var(--bg-surface);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                top: 0;
                z-index: 100;
                padding: 1rem;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                border-left: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar .logo {
                margin-bottom: 0;
                font-size: 1.1rem;
            }

            .sidebar .logo img {
                height: 24px !important;
            }

            .nav-item {
                margin-bottom: 0;
                padding: 0.5rem;
                font-size: 0.85rem;
                gap: 4px;
            }

            .nav-item svg {
                width: 16px;
                height: 16px;
            }

            .view-site-link {
                display: none;
            }

            .main-content {
                margin-right: 0;
                margin-top: 70px;
                padding: 1.5rem 1rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .header button {
                width: 100%;
            }

            .review-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .review-actions {
                width: 100%;
                display: flex;
                gap: 0.5rem;
                margin-right: 0 !important;
            }

            .review-actions button {
                flex: 1;
            }
        }
        }

        .settings-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            margin-top: 2rem;
        }
    </style>

</head>

    <script>


        // Utilities
        function generateId(name, text) {
            try {
                return btoa(unescape(encodeURIComponent(name + text))).substring(0, 15);
            } catch (e) {
                return 'id_' + Math.random().toString(36).substr(2, 9);
            }
        }

        // Navigation
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }



        function copyReviewLink() {
            let reviewUrl = 'https://abu-naif.com/?review=true';
            navigator.clipboard.writeText('نسعد بمشاركتك تجربتك معنا عبر الرابط التالي\n' + reviewUrl).then(() => {
                alert('تم حفظ رابط التقييم في الحافظة بنجاح!');
            });
        }

        // --- Reviews Logic ---
        let harajDisplayLimit = 10;
        let localDisplayLimit = 10;
        let allReviews = [];

        async function loadReviews() {
            try {
                let dbReviews = [];
                try {
                    const res = await fetch(workerUrl);
                    if (res.ok) {
                        dbReviews = await res.json();
                    }
                } catch (e) {
                    console.warn("Could not load worker reviews", e);
                }

                let jsonReviews = [];
                try {
                    const jsonRes = await fetch('reviews.json');
                    if (jsonRes.ok) {
                        jsonReviews = await jsonRes.json();
                    }
                } catch (e) {
                    console.warn("Could not load reviews.json", e);
                }

                const mergedDocs = [...dbReviews, ...jsonReviews];

                allReviews = mergedDocs.map((doc, index) => ({
                    id: doc.id || generateId(doc.name || 'user', doc.text || String(index)),
                    name: doc.name,
                    text: doc.text,
                    date: doc.date,
                    isHaraj: doc.isHaraj !== false,
                    isLocal: doc.isHaraj === false,
                    phone: doc.phone,
                    isStatic: !doc.id // Flag to identify reviews from reviews.json
                }));

                renderReviews(allReviews);
            } catch (e) {
                console.error("Error loading reviews", e);
                const harajContainer = document.getElementById('harajReviewsContainer');
                if (harajContainer) harajContainer.innerHTML = '<p style="color: var(--danger);">عذراً، واجهنا مشكلة في استرداد الآراء. يرجى التحقق من حالة الخادم.</p>';
            }
        }

        function renderReviews(reviews) {
            const localContainer = document.getElementById('localReviewsContainer');
            const harajContainer = document.getElementById('harajReviewsContainer');

            if (localContainer) localContainer.innerHTML = '';
            if (harajContainer) harajContainer.innerHTML = '';

            const sortedReviews = [...reviews].sort((a, b) => new Date(b.date) - new Date(a.date));

            const harajReviews = sortedReviews.filter(r => r.isHaraj !== false);
            const localReviewsList = sortedReviews.filter(r => r.isHaraj === false);

            if (localContainer) {
                if (localReviewsList.length === 0) {
                    localContainer.innerHTML = '<p style="color: var(--text-secondary);">لم يتم تسجيل آراء عبر المنصة المباشرة بعد.</p>';
                } else {
                    localReviewsList.slice(0, localDisplayLimit).forEach(r => {
                        localContainer.innerHTML += generateAdminReviewHTML(r);
                    });

                    if (localReviewsList.length > localDisplayLimit) {
                        localContainer.innerHTML += `
                            <button class="btn" style="width: 100%; margin-top: 1rem; border: 1px solid var(--gold); background: transparent; color: var(--gold);" 
                                onclick="localDisplayLimit += 10; renderReviews(allReviews);">إظهار المزيد من النتائج</button>
                        `;
                    }
                }
            }

            if (harajContainer) {
                if (harajReviews.length === 0) {
                    harajContainer.innerHTML = '<p style="color: var(--text-secondary);">لا توجد آراء مسجلة من منصة حراج حالياً.</p>';
                } else {
                    harajReviews.slice(0, harajDisplayLimit).forEach(r => {
                        harajContainer.innerHTML += generateAdminReviewHTML(r);
                    });

                    if (harajReviews.length > harajDisplayLimit) {
                        harajContainer.innerHTML += `
                            <button class="btn" style="width: 100%; margin-top: 1rem; border: 1px solid var(--gold); background: transparent; color: var(--gold);" 
                                onclick="harajDisplayLimit += 10; renderReviews(allReviews);">إظهار المزيد من النتائج</button>
                        `;
                    }
                }
            }
        }

        function generateAdminReviewHTML(r) {
            const bg = r.isHaraj === false ? 'background: #dcfce7;' : '';
            const readonlyAttr = r.isStatic ? 'readonly' : '';
            const disabledAttr = r.isStatic ? 'disabled' : '';
            
            let actionsHtml = '';
            if (!r.isStatic) {
                actionsHtml = `
                    <div class="review-actions" style="margin-right: 1rem;">
                        <button class="btn" style="padding: 0.5rem 1rem;" onclick="saveReview('${r.id}')">حفظ التعديلات</button>
                        <button class="btn btn-danger" style="padding: 0.5rem 1rem;" onclick="deleteReview('${r.id}', ${r.isLocal})">إزالة</button>
                    </div>
                `;
            } else {
                actionsHtml = `
                    <div class="review-actions" style="margin-right: 1rem;">
                        <span style="color: var(--text-secondary); font-size: 0.85rem; padding: 0.5rem;">رأي مؤرشف (قراءة فقط)</span>
                    </div>
                `;
            }

            return `
                <div class="review-card" id="rev-card-${r.id}" style="${bg}" draggable="true" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    <div class="review-header">
                        <div style="cursor: grab; margin-left: 1rem; color: var(--text-secondary);" title="اسحب لإعادة الترتيب">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        </div>
                        <div style="flex:1;">
                            <input type="text" class="form-control review-name" id="name-${r.id}" value="${r.name}" ${readonlyAttr} style="background:transparent; border:none; border-bottom:1px solid var(--border); padding:0.5rem; margin-bottom:0.5rem; color:var(--gold); width:100%;">
                            <div style="color:var(--text-secondary); font-size:0.85rem; margin-bottom: 0.5rem; padding-right: 0.5rem;">${r.date} ${r.isLocal ? '(رأي من زائر)' : ''}</div>
                            ${r.phone ? `<div style="color:var(--gold); font-size:0.85rem; margin-bottom: 0.5rem; padding-right: 0.5rem;">📱 الهاتف: <a href="tel:${r.phone}" style="color:var(--gold); text-decoration:none;">${r.phone}</a></div>` : ''}
                            <label style="display:flex; align-items:center; gap:0.5rem; color:var(--text-secondary); font-size:0.9rem; padding-right:0.5rem; cursor:${r.isStatic ? 'default' : 'pointer'};">
                                <input type="checkbox" id="haraj-${r.id}" ${r.isHaraj !== false ? 'checked' : ''} ${disabledAttr}>
                                مستورد من حراج
                            </label>
                        </div>
                        ${actionsHtml}
                    </div>
                    <textarea class="form-control" id="text-${r.id}" ${readonlyAttr} style="min-height:80px;">${r.text}</textarea>
                </div>
            `;
        }

        // --- Drag and Drop Logic ---
        let draggedReviewId = null;

        function dragStart(e) {
            draggedReviewId = e.target.closest('.review-card').id.replace('rev-card-', '');
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => e.target.style.opacity = '0.5', 0);
        }

        function dragEnter(e) {
            e.preventDefault();
            const targetCard = e.target.closest('.review-card');
            if (targetCard && targetCard.id !== `rev-card-${draggedReviewId}`) {
                targetCard.style.borderTop = "2px solid var(--gold)";
            }
        }

        function dragLeave(e) {
            const targetCard = e.target.closest('.review-card');
            if (targetCard) {
                targetCard.style.borderTop = "1px solid var(--border)";
            }
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function drop(e) {
            e.preventDefault();
            const targetCard = e.target.closest('.review-card');

            document.querySelectorAll('.review-card').forEach(c => {
                c.style.opacity = '1';
                c.style.borderTop = "1px solid var(--border)";
            });

            if (targetCard && targetCard.id !== `rev-card-${draggedReviewId}`) {
                const targetId = targetCard.id.replace('rev-card-', '');

                // Reorder allReviews array
                const draggedIndex = allReviews.findIndex(r => r.id === draggedReviewId);
                const targetIndex = allReviews.findIndex(r => r.id === targetId);

                const [draggedItem] = allReviews.splice(draggedIndex, 1);
                allReviews.splice(targetIndex, 0, draggedItem);

                // Save new order to localStorage
                const newOrder = allReviews.map(r => r.id);
                localStorage.setItem('reviews_order', JSON.stringify(newOrder));

                renderReviews(allReviews);
            }
        }

        async function saveReview(id, isLocal) {
            const newName = document.getElementById(`name-${id}`).value;
            const newText = document.getElementById(`text-${id}`).value;
            const newIsHaraj = document.getElementById(`haraj-${id}`).checked;

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            try {
                const res = await fetch(`${workerUrl}?id=${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: newName,
                        text: newText,
                        isHaraj: newIsHaraj
                    })
                });
                if (!res.ok) throw new Error('Update failed');
                alert('تم حفظ التعديلات بنجاح!');
                await loadReviews();
            } catch (e) {
                alert("حدث خطأ أثناء الحفظ التعديلات.");
                console.error(e);
            }

            btn.innerText = originalText;
            btn.disabled = false;
        }

        async function deleteReview(id, isLocal) {
            if (!confirm('هل أنت متأكد من إزالة هذا التقييم؟')) return;

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "جاري الإزالة...";
            btn.disabled = true;

            try {
                const res = await fetch(`${workerUrl}?id=${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                await loadReviews();
            } catch (e) {
                alert("حدث خطأ أثناء الإزالة.");
                console.error(e);
            }

            btn.innerText = originalText;
            btn.disabled = false;
        }

        function addHarajReview() {
            document.getElementById('reviewForm').reset();
            document.querySelectorAll('.star-rating-btn').forEach(btn => btn.classList.add('active'));
            document.getElementById('reviewForm').style.display = 'block';
            const successMsg = document.getElementById('reviewSuccessMessage');
            if (successMsg) successMsg.style.display = 'none';
            const fb = document.getElementById('reviewFeedback');
            if (fb) fb.style.display = 'none';
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
        }

        function setStar(group, val) {
            const container = document.getElementById('star-' + group);
            if (!container) return;
            container.setAttribute('data-val', val);
            const stars = container.querySelectorAll('.star-rating-btn');
            stars.forEach((s, i) => {
                if (i < val) s.classList.add('active');
                else s.classList.remove('active');
            });
        }
        // Initialize stars
        ['amanah', 'speed', 'prof', 'rec'].forEach(g => setStar(g, 5));

        async function submitAdminReview(event) {
            event.preventDefault();
            const name = document.getElementById('revName').value.trim();
            const phone = document.getElementById('revPhone').value.trim();
            const text = document.getElementById('revComment').value.trim();
            const btn = document.getElementById('submitReviewBtn');
            const feedback = document.getElementById('reviewFeedback');

            btn.disabled = true;
            btn.innerText = "جاري الإضافة...";
            if (feedback) feedback.style.display = 'none';

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');

            try {
                const res = await fetch(workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        phone: phone,
                        date: yyyy + '/' + mm + '/' + dd,
                        text: text || 'تم التقييم بنجاح',
                        isHaraj: document.getElementById('isHarajReviewCheckbox').checked
                    })
                });
                
                if (!res.ok) throw new Error('Failed to create');

                document.getElementById('reviewForm').style.display = 'none';
                const successMsg = document.getElementById('reviewSuccessMessage');
                if (successMsg) successMsg.style.display = 'block';

                await loadReviews();
                setTimeout(() => {
                    closeReviewModal();
                }, 2000);
            } catch (e) {
                console.error(e);
                if (feedback) {
                    feedback.textContent = "حدث خطأ أثناء الإضافة.";
                    feedback.style.color = "red";
                    feedback.style.display = 'block';
                }
            }
            btn.disabled = false;
            btn.innerText = "إضافة التقييم";
        }



        // Init
        window.onload = () => {
            loadReviews();
        };

        // Listen for storage changes from other tabs to update instantly
        window.addEventListener('storage', (e) => {
            if (['site_reviews', 'deleted_reviews', 'edited_reviews', 'admin_photos', 'deleted_photos'].includes(e.key)) {
                loadReviews();
            }
        });

    </script>
</body>

</html>
